# Starter pipeline
trigger:
  - main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

# Use Node.js 20 (matches package.json engines)
- task: NodeTool@0
  displayName: 'Use Node.js 20'
  inputs:
    versionSpec: '20.x'

# Install deps, install TFX, build & package VSIX
- task: Bash@3
  displayName: 'Install deps + build + package VSIX'
  inputs:
    targetType: inline
    script: |
      set -euo pipefail

      echo "Installing npm dependencies"
      npm install

      echo "Installing TFX CLI"
      npm install -g tfx-cli
      tfx version

      echo "Removing old VSIX (if any)"
      rm -f *.vsix || true

      echo "Building and packaging VSIX"
      npm run package

      echo "Detecting generated VSIX"
      VSIX_FILE=$(ls -1 *.vsix | head -n 1)

      if [ -z "$VSIX_FILE" ]; then
        echo "ERROR: No VSIX file found"
        exit 1
      fi

      echo "VSIX_FILE=$VSIX_FILE"
      echo "##vso[task.setvariable variable=VSIX_FILE]$VSIX_FILE"

# Upload the VSIX using the generated name
- task: PublishPipelineArtifact@1
  displayName: 'Upload VSIX to Azure DevOps'
  inputs:
    targetPath: '$(Build.SourcesDirectory)/$(VSIX_FILE)'
    artifactName: '$(VSIX_FILE)'
    publishLocation: pipeline
